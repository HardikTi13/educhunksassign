<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rich Text Editor Frame</title>
  <!-- Google Fonts for Modern Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="editor.css">
</head>
<body>
  <div class="editor-container">
    <!-- Toolbar Section -->
    <header class="toolbar">
      <div class="toolbar-group">
        <!-- Formatting Buttons -->
        <button id="btn-bold" class="toolbar-btn" title="Bold (Ctrl+B)">
          <svg viewBox="0 0 24 24" class="btn-icon">
            <path d="M15.6 10.79c.97-.67 1.65-1.77 1.65-2.79 0-2.26-1.75-4-4-4H7v14h7.04c2.09 0 3.71-1.7 3.71-3.79 0-1.52-.86-2.82-2.15-3.42zM10 6.5h3c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-3v-3zm3.5 9H10v-3h3.5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5z"/>
          </svg>
        </button>
        <button id="btn-italic" class="toolbar-btn" title="Italic (Ctrl+I)">
          <svg viewBox="0 0 24 24" class="btn-icon">
            <path d="M10 4v3h2.21l-3.42 8H6v3h8v-3h-2.21l3.42-8H18V4z"/>
          </svg>
        </button>
        <button id="btn-strikethrough" class="toolbar-btn" title="Strikethrough">
          <svg viewBox="0 0 24 24" class="btn-icon">
            <path d="M10 19h4v-3h-4v3zM5 4v3h5v3H5v3h5v3H5v3h14V4H5zm9 6h-4V7h4v3z"/>
          </svg>
        </button>
      </div>

      <div class="toolbar-divider"></div>

      <div class="toolbar-group">
        <!-- Undo/Redo Buttons -->
        <button id="btn-undo" class="toolbar-btn" title="Undo (Ctrl+Z)">
          <svg viewBox="0 0 24 24" class="btn-icon">
            <path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/>
          </svg>
        </button>
        <button id="btn-redo" class="toolbar-btn" title="Redo (Ctrl+Y)">
          <svg viewBox="0 0 24 24" class="btn-icon">
            <path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"/>
          </svg>
        </button>
      </div>

      <!-- Sync Status Indicator Badge -->
      <div class="sync-status" id="sync-status">
        <span class="status-dot"></span>
        <span class="status-text">Synced</span>
      </div>
    </header>

    <!-- Rich Text Editor Workspace -->
    <main class="editor-workspace">
      <div 
        id="editor" 
        class="editor-area" 
        contenteditable="true" 
        placeholder="Type something here, select text to format..."
        spellcheck="false"
      ></div>
    </main>
  </div>

  <script src="editor.js"></script>
</body>
</html>
